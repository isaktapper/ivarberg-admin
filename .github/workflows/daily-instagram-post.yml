name: Daily Instagram Post

on:
  schedule:
    # Kl 08:00 svensk tid oavsett sommar-/vintertid:
    # 06:00 UTC = 08:00 CEST (sommartid), 07:00 UTC = 08:00 CET (vintertid).
    # Scriptets timvakt släpper bara igenom körningen där Stockholm-klockan är 08,
    # och instagram_posts-tabellen (UNIQUE post_date) stoppar ev. dubbletter.
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:  # Tillåter manuell körning från GitHub Actions UI
    inputs:
      force:
        description: 'Kringgå timvakten (kör oavsett klockslag)'
        required: false
        default: 'false'
      dry_run:
        description: 'Dry run - generera posten men skicka inte'
        required: false
        default: 'false'

# Add write permissions for issues
permissions:
  contents: read
  issues: write

jobs:
  publish-instagram-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish Instagram post
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://eu.i.posthog.com' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_WEBHOOK_API_KEY: ${{ secrets.MAKE_WEBHOOK_API_KEY }}
          ADMIN_BASE_URL: ${{ secrets.ADMIN_BASE_URL }}
          INSTAGRAM_IMAGE_SECRET: ${{ secrets.INSTAGRAM_IMAGE_SECRET }}
          FORCE_RUN: ${{ github.event.inputs.force || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: pnpm tsx scripts/publish-instagram-post.ts

  notify-on-failure:
    needs: publish-instagram-post
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Daily Instagram Post Failed';
            const body = `The daily Instagram post failed on ${new Date().toISOString()}.

            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the logs and investigate.`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'instagram-post-failure'
            });

            // Only create if no open issue exists
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['instagram-post-failure', 'automated']
              });
            }
